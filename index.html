<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>My WebApp</title>
</head>
<body>


<div id="result"></div>

<script>

const API =
'https://script.google.com/macros/s/AKfycbyTwC1n-KvDJDsEnyA9oxHbvvkY0O9QMKpA6eJETCXmVzfnZOtKtqLZo-Rr_LrZEU5wHA/exec';

fetch(API)
  .then(res => res.json())
  .then(data => {

    let html = "<table border='1'>";

    data.forEach(row => {
      html += "<tr>";

      row.forEach(col => {
        html += `<td>${col}</td>`;
      });

      html += "</tr>";
    });

    html += "</table>";

    document.getElementById("result").innerHTML = html;

  });

</script>

</body>
</html>
